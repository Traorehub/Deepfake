<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurAI | Analyse Statique</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-base: #050505;
            --bg-panel: rgba(15, 15, 20, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --text-muted: #888;
            --color-ok: #00E676;
            --color-warn: #FFD600;
            --color-danger: #FF1744;
            --color-info: #00E5FF;
            --font-ui: 'Rajdhani', sans-serif;
            --font-data: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: 60px 1fr;
            grid-template-areas: 
                "header header"
                "main sidebar-right";
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        /* --- Header --- */
        header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .logo { font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
        .logo span { color: var(--color-warn); }
        .nav-link { color: var(--text-main); text-decoration: none; font-weight: 600; padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 4px; transition: all 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); }

        /* --- Panels --- */
        .panel {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
            z-index: 5;
        }
        .panel-right { grid-area: sidebar-right; }

        .section-header {
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* --- Main View (Upload Area) --- */
        .main-view {
            grid-area: main;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .upload-container {
            width: 100%;
            height: 100%;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .upload-container.dragover {
            border-color: var(--color-warn);
            background: rgba(255, 214, 0, 0.05);
        }

        .upload-icon { font-size: 4rem; margin-bottom: 20px; color: var(--text-muted); }
        .upload-text { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
        .upload-subtext { color: var(--text-muted); font-family: var(--font-data); }
        
        #file-input { display: none; }
        .btn-browse {
            margin-top: 20px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-ui);
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-browse:hover { background: rgba(255,255,255,0.2); }

        #preview-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain;
            display: none;
            background: #000;
        }

        /* --- Identity Card --- */
        .identity-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }
        .id-photo { width: 80px; height: 80px; border-radius: 50%; background: #222; margin-bottom: 15px; border: 3px solid #444; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: all 0.3s; }
        .id-name { font-size: 1.5rem; font-weight: 600; margin-bottom: 5px; }
        .id-role { font-family: var(--font-data); font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; background: #333; }

        .status-granted .identity-box { border-color: rgba(0, 230, 118, 0.3); background: rgba(0, 230, 118, 0.05); }
        .status-granted .id-photo { border-color: var(--color-ok); color: var(--color-ok); box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }
        .status-granted .id-role { background: rgba(0, 230, 118, 0.2); color: var(--color-ok); border: 1px solid var(--color-ok); }

        .status-partial .identity-box { border-color: rgba(255, 214, 0, 0.3); background: rgba(255, 214, 0, 0.05); }
        .status-partial .id-photo { border-color: var(--color-warn); color: var(--color-warn); box-shadow: 0 0 20px rgba(255, 214, 0, 0.4); }
        .status-partial .id-role { background: rgba(255, 214, 0, 0.2); color: var(--color-warn); border: 1px solid var(--color-warn); }

        .status-denied .identity-box { border-color: rgba(255, 23, 68, 0.3); background: rgba(255, 23, 68, 0.05); }
        .status-denied .id-photo { border-color: var(--color-danger); color: var(--color-danger); box-shadow: 0 0 20px rgba(255, 23, 68, 0.4); }
        .status-denied .id-role { background: rgba(255, 23, 68, 0.2); color: var(--color-danger); border: 1px solid var(--color-danger); }

        /* --- Metrics --- */
        .metric-box { padding: 15px; background: rgba(255,255,255,0.02); border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .metric-value { font-family: var(--font-data); font-size: 1.5rem; margin-top: 5px; color: var(--text-main); }
        
        .alert-box { padding: 15px; border-radius: 6px; border: 1px solid #444; text-align: center; font-weight: bold; transition: all 0.3s; margin-bottom: 20px; }
        .alert-box.danger { background: rgba(255, 23, 68, 0.2); border-color: var(--color-danger); color: var(--color-danger); animation: shake 0.5s; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .bar-bg { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 10px; }
        .bar-fill { height: 100%; background: var(--color-info); width: 0%; transition: width 0.3s; }
        .bar-fill.high { background: var(--color-danger); }
        
        #loading { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 20; color: var(--color-warn); font-family: var(--font-data); font-size: 1.5rem; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,214,0,0.2); border-top-color: var(--color-warn); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">SECUR<span>AI</span> // POC STATIQUE</div>
        <a href="/" class="nav-link">← Retour Live Video</a>
    </header>

    <!-- MAIN VIEW -->
    <div class="main-view">
        <div class="upload-container" id="drop-zone">
            <div id="upload-content" style="text-align: center;">
                <div class="upload-icon">📂</div>
                <div class="upload-text">Glisser-déposer une image ici</div>
                <div class="upload-subtext">JPG, PNG supportés</div>
                <button class="btn-browse" onclick="document.getElementById('file-input').click()">Parcourir</button>
            </div>
            <input type="file" id="file-input" accept="image/*">
            <img id="preview-img" src="" alt="Aperçu" onclick="document.getElementById('file-input').click()" style="cursor: pointer;" title="Cliquer pour analyser une autre image">
            <div id="loading"><div class="spinner"></div>ANALYSE EN COURS...</div>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel panel-right" id="panel-right">
        <div>
            <div class="section-header">Résultat d'Identification</div>
            <div class="identity-box">
                <div class="id-photo" id="id-photo">👤</div>
                <div class="id-name" id="ui-name">EN ATTENTE</div>
                <div class="id-role" id="ui-access-level">UPLOAD REQUIS</div>
                <div style="font-family: var(--font-data); font-size: 0.8rem; margin-top: 10px; color: var(--text-muted);">
                    SIMILARITÉ: <span id="ui-conf" style="color: var(--text-main);">0%</span>
                </div>
            </div>
        </div>

        <div>
            <div class="section-header">Détection Anti-Spoofing (FFT)</div>
            <div class="alert-box" id="anomaly-alert">EN ATTENTE</div>
            <div class="metric-box">
                <div style="font-size: 0.8rem; color: var(--text-muted);">Score de Haute Fréquence</div>
                <div class="metric-value" id="anomaly-score-text">0.00</div>
                <div class="bar-bg">
                    <div class="bar-fill" id="anomaly-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const uploadContent = document.getElementById('upload-content');
        const loading = document.getElementById('loading');
        const panelRight = document.getElementById('panel-right');

        // Drag and Drop events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', function() { handleFiles(this.files); });

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    // Preview local file briefly
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        previewImg.src = e.target.result;
                        previewImg.style.display = 'block';
                        uploadContent.style.display = 'none';
                    }
                    reader.readAsDataURL(file);
                    
                    // Upload and analyze
                    uploadFile(file);
                }
            }
        }

        async function uploadFile(file) {
            loading.style.display = 'flex';
            
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('/api/analyze_static', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                loading.style.display = 'none';
                
                if (data.success) {
                    updateUI(data.results);
                } else {
                    alert("Erreur: " + data.error);
                }
            } catch (error) {
                loading.style.display = 'none';
                console.error('Upload Error:', error);
                alert('Erreur réseau lors de l\'analyse');
            }
        }

        function updateUI(res) {
            // Image Base64 with Bbox
            if (res.image_base64) {
                previewImg.src = "data:image/jpeg;base64," + res.image_base64;
            }

            // Identity
            const idName = res.identity !== "Inconnu" && res.identity !== "Aucun visage" ? res.identity : "INCONNU";
            document.getElementById('ui-name').innerText = idName.toUpperCase();
            document.getElementById('ui-conf').innerText = `${(res.confidence * 100).toFixed(1)}%`;
            document.getElementById('ui-access-level').innerText = res.access_level;

            panelRight.className = 'panel panel-right'; // Reset
            if (res.identity === "Aucun visage") {
                document.getElementById('id-photo').innerText = '❓';
            } else if (idName !== "INCONNU") {
                if (res.access_level === 'ADMIN') {
                    panelRight.classList.add('status-granted');
                    document.getElementById('id-photo').innerText = '✓';
                } else if (res.access_level === 'EMPLOYEE') {
                    panelRight.classList.add('status-partial');
                    document.getElementById('id-photo').innerText = '🔑';
                } else {
                    panelRight.classList.add('status-denied');
                    document.getElementById('id-photo').innerText = '✗';
                }
            } else {
                panelRight.classList.add('status-denied');
                document.getElementById('id-photo').innerText = '👤';
            }

            // Anomaly
            const anomAlert = document.getElementById('anomaly-alert');
            const anomBar = document.getElementById('anomaly-bar');
            
            if (res.identity === "Aucun visage") {
                anomAlert.className = 'alert-box';
                anomAlert.innerText = 'AUCUN VISAGE À ANALYSER';
                anomBar.style.width = '0%';
                document.getElementById('anomaly-score-text').innerText = '0.00';
            } else if (res.anomaly_detected) {
                anomAlert.className = 'alert-box danger';
                anomAlert.innerText = '⚠️ SPOOFING DÉTECTÉ (FFT)';
                anomBar.classList.add('high');
            } else {
                anomAlert.className = 'alert-box';
                anomAlert.innerText = 'IMAGE INTÈGRE';
                anomBar.classList.remove('high');
            }
            
            const scoreVal = res.anomaly_score.toFixed(3);
            document.getElementById('anomaly-score-text').innerText = scoreVal;
            document.getElementById('anomaly-bar').style.width = `${Math.min(scoreVal * 100, 100)}%`;
        }
    </script>
</body>
</html>
